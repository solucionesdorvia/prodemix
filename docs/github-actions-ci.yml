# Copiar a `.github/workflows/ci.yml` en el repo (o pegar en GitHub → Actions → New workflow).
# Si `git push` falla por "workflow scope", añadí el scope `workflow` al PAT o usá la UI de GitHub.

name: CI

on:
  push:
    branches: [main, master]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      AUTH_SECRET: ci-placeholder-auth-secret-min-32-chars!!
      DATABASE_URL: postgresql://user:pass@localhost:5432/db?schema=public

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install
        run: npm ci

      - name: Prisma generate
        run: npx prisma generate

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm run test

      - name: Production build
        run: npm run build
